<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" type="text/css" href="./styles/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/header.css" />
    <link rel="stylesheet" href="styles/main.css" />
  </head>
  <body>
    <header>
      <nav>
        <div id="hamburger">
          <svg
            width="30px"
            height="30px"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <g id="Menu / Hamburger_MD">
              <path
                id="Vector"
                d="M5 17H19M5 12H19M5 7H19"
                stroke="white"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </g>
          </svg>
        </div>

        <ul id="nav-links">
          <li><a href="https://www.sron.nl">Home</a></li>
          <li>
            <a href="https://www.sron.nl/onderzoeksvragen/">Onderzoeksvragen</a>
          </li>
          <li><a href="https://www.sron.nl/pijlers/">Pijlers</a></li>
          <li><a href="https://www.sron.nl/missies/">Missies</a></li>
          <li><a href="https://www.sron.nl/over-ons/">Over ons</a></li>
          <li><a href="https://www.sron.nl/contact/">Contact</a></li>
          <li><a href="/">Zoeken</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <main>
        <!-- phase 1 -->
        <section class="phase-1">
          <div class="sticky-scene">
            <div class="text-p1">
              <h1>NEBULA - Xplorer</h1>
              <p>
                Lorem ipsum dolor sit amet, consectetur adipisconsectetur
                adipiscing elit.cing elit.
              </p>
            </div>
            <div class="earth-container">
              <img src="img/earth.png" alt="earth" />
            </div>
            <div class="black-hole-container">
              <img src="img/earth.png" alt="black hole" />
            </div>
          </div>
        </section>

        <!-- phase 2 -->
        <section class="astronaut-layer">
       
            <img
              class="astronaut"
              src="img/astronaut.png"
              alt="Aaldert van Amerongen"
              data-naam="Aaldert van Amerongen"
              data-info="Dr. Van Amerongen is hoofd van het Earth Observation Programme bij SRON en leidt de ontwikkeling van nationale en internationale satellietprojecten gericht op klimaat, luchtkwaliteit en ecosystemen. Het programma ondersteunt wetenschap, beleid en industrie bij klimaatactie, met een sterke focus op broeikasgassen zoals methaan. Hij werkt samen met overheden en internationale organisaties, adviseert de Nederlandse overheid en draagt bij aan innovatieve Earth observation-technologieën. Sinds 2020 staat hij aan het hoofd van het programma."
              data-img="img/astronaut.png"
            />
            <img
              class="astronaut"
              src="img/astronaut.png"
              alt="Alex Simon"
              data-naam="Alex Simon"
              data-info="Hier komt de beschrijving van Alex."
              data-img="img/alex.jpg"
            />
            <img
              class="astronaut"
              src="img/astronaut.png"
              alt="Alexander Eigenraam"
              data-naam="Alexander Eigenraam"
              data-info="Hier komt de beschrijving van Alexander."
              data-img="img/alexander.jpg"
            />
            <img
              class="astronaut"
              src="img/astronaut.png"
              alt="Ana Isabel Lopez Noreña"
              data-naam="Ana Isabel Lopez Noreña"
              data-info="Hier komt de beschrijving van Ana Isabel."
              data-img="img/ana.jpg"
            />
          </div>

          <div id="popup" class="popup verborgen">
            <h3 id="popup-naam"></h3>
            <div class="popup-inhoud">
              <img id="popup-img" src="" alt="" />
              <p id="popup-info"></p>
            </div>
            <button id="popup-sluit">Sluiten</button>
        </section>
      </main>
    </main>

    <script src="scripts/script.js"></script>
  </body>
</html>
